        .sm-hidden {
            display: none;

    .loading {
        text-align: center;
        width: 670px;
    }

    .loader {
        position: relative;
        width: 60px;
        height: 60px;
        border-radius: 50%;
        margin: 75px;
        display: inline-block;
        vertical-align: middle;
    }

    .loader-star {
        position: absolute;
        top: calc(50% - 12px);
    }

    .loader-1 .loader-outter { 
        position: absolute; 
        border: 4px solid #f50057; 
        border-left-color: transparent; 
        border-bottom: 0; 
        width: 100%; 
        height: 100%; 
        border-radius: 50%; 
        -webkit-animation: loader-1-outter 1s cubic-bezier(.42, .61, .58, .41) infinite; 
        animation: loader-1-outter 1s cubic-bezier(.42, .61, .58, .41) infinite; 
    }
    .loader-1 .loader-inner { 
        position: absolute; 
        border: 4px solid #f50057; 
        border-radius: 50%; 
        width: 40px; 
        height: 40px; 
        left: calc(50% - 20px); 
        top: calc(50% - 20px); 
        border-right: 0; 
        border-top-color: transparent; 
        -webkit-animation: loader-1-inner 1s cubic-bezier(.42, .61, .58, .41) infinite; 
        animation: loader-1-inner 1s cubic-bezier(.42, .61, .58, .41) infinite; 
    }  

    @-webkit-keyframes loader-1-outter {
        0% {
            -webkit-transform: rotate(0deg);
            transform: rotate(0deg);
        }
        100% {
            -webkit-transform: rotate(360deg);
            transform: rotate(360deg);
        }
    }
    @keyframes loader-1-outter {
        0% {
            -webkit-transform: rotate(0deg);
            transform: rotate(0deg);
        }
        100% {
            -webkit-transform: rotate(360deg);
            transform: rotate(360deg);
        }
    }
     @-webkit-keyframes loader-1-inner {
        0% {
            -webkit-transform: rotate(0deg);
            transform: rotate(0deg);
        }
        100% {
            -webkit-transform: rotate(-360deg);
            transform: rotate(-360deg);
        }
    }
     @keyframes loader-1-inner {
        0% {
            -webkit-transform: rotate(0deg);
            transform: rotate(0deg);
        }
        100% {
            -webkit-transform: rotate(-360deg);
            transform: rotate(-360deg);
        }
    }

    <script>
    $(function () {
        var rvnMenu = $("#navbar").rvnm({
            // mode: 'mobile',
            responsive: false,
            searchable: true,
            theme: 'dark-lesb'
        });
        // rvnMenu.setMode('minimal');
        rvnMenu.setTheme('dark-ruby');
    });
    String.prototype.format = function() {
        var values = arguments;
        return this.replace(/\{(\d+)\}/g, function(match, index) {
            if (values.length > index) {
                return values[index];
            } else {
                return "";
            }
        });
    };

    function load(data) {
        $("div.loader-1").show();
        $("h2").text(data["title"]);
        var len = data["images"].length;
        var gallery = $(".gallery");
        gallery.empty();
        for (var i = 0; i < len; i++) {
            var urls = data["images"][i]["detail"]["url"];
            gallery.append("<a href='" + urls["original"] + "' data-caption='No." + data["images"][i]["id"] + "'><img src='" + urls["thumb"] + "'></a>");
        }
        baguetteBox.run('.baguetteBox', {
            animation: 'fadeIn',
            noScrollbars: true
        });
        $("div.loader-1").hide();
    }
    $(function() {
        $.getJSON("https://api.ipify.org?format=jsonp&callback=?", function(json){$("#ip").text("Welcome friend whose IP: " + json.ip);});
        $("nav a").click(function(){
            var tid = $(this).attr("id");
            if (tid){
                $.ajax({
                    type: "get",
                    async: false,
                    url: "https://my91porn.github.io/jsonp/{0}.json".format(tid),
                    dataType: "jsonp",
                    jsonp: "callback", //传递给请求处理程序或页面的，用以获得jsonp回调函数名的参数名(默认为:callback)
                    jsonpCallback: "load", //自定义的jsonp回调函数名称，默认为jQuery自动生成的随机函数名
                    statusCode: { 404: function() { console.log("404"); } },
                    success: function(data) {
