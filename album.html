<!DOCTYPE html>
<html>

<head>
    <title> 相册 </title>
    <link rel="stylesheet" href="css/baguetteBox.min.css">
    <script src="js/baguetteBox.min.js"></script>
    <script src="js/jquery.min.js"></script>
    <style>
    body {
        background-color: #666;
        color: #ddd;
        font-family: Helvetica, Arial, sans-serif;
        margin: 0;
    }

    h1, h2, h3, footer,
    .gallery {
        text-align: center;
    }

    @media (max-width: 480px) {
        pre {
            max-width: 98%;
        }
    }

    .content {
        max-width: 1160px;
        margin: 0 auto;
    }

    .gallery:after {
        content: '';
        display: block;
        height: 2px;
        margin: .5em 0 1.4em;
        background-image: -webkit-linear-gradient(left, rgba(0, 0, 0, 0) 0%, rgba(77, 77, 77, 1) 50%, rgba(0, 0, 0, 0) 100%);
        background-image: linear-gradient(to right, rgba(0, 0, 0, 0) 0%, rgba(77, 77, 77, 1) 50%, rgba(0, 0, 0, 0) 100%);
    }

    .gallery img {
        height: 100%;
    }

    .gallery a {
        width: 240px;
        height: 180px;
        display: inline-block;
        overflow: hidden;
        margin: 4px 6px;
        box-shadow: 0 0 4px -1px #000;
    }

    @media (max-width: 768px) {
        .sm-hidden {
            display: none;
        }
    }
    </style>
</head>

<body>
    <h3>  </h3>
    <input type="text" name="tid"><input type="submit" name="submit">
    <p id="ip"></p>
    <div class="content">
        <div class="baguetteBox gallery">
        </div>
    </div>
    <script>
    String.prototype.format = function() {
        var values = arguments;
        return this.replace(/\{(\d+)\}/g, function(match, index) {
            if (values.length > index) {
                return values[index];
            } else {
                return "";
            }
        });
    };

    function load(data) {
        $("h3").text(data["title"]);
        var len = data["images"].length;
        var gallery = $(".gallery");
        gallery.empty();
        for (var i = 0; i < len; i++) {
            var urls = data["images"][i]["detail"]["url"];
            gallery.append("<a href='" + urls["original"] + "' data-caption='No." + data["images"][i]["id"] + "'><img src='" + urls["thumb"] + "'></a>");
        }
        baguetteBox.run('.baguetteBox', {
            animation: 'fadeIn',
            noScrollbars: true
        });
    }
    </script>
    <script>
    $(function() {
        $.getJSON("https://api.ipify.org?format=jsonp&callback=?", function(json) { $("#ip").text("Your IP address is: " + json.ip); });
        $("input[name='submit']").click(function() {
            var tid = $("input[name='tid']").val();
            $.ajax({
                type: "get",
                async: false,
                url: "https://my91porn.github.io/jsonp/{0}.json".format(tid),
                dataType: "jsonp",
                jsonp: "callback", //传递给请求处理程序或页面的，用以获得jsonp回调函数名的参数名(默认为:callback)
                jsonpCallback: "load", //自定义的jsonp回调函数名称，默认为jQuery自动生成的随机函数名
                statusCode: { 404: function() { console.log("404"); } },
                success: function(data) {
                    console.log("success");
                    console.log(data);
                },
                error: function() {
                    console.log("fail");
                }
            });
        })
    });
    </script>
</body>

</html>
