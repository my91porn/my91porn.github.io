<!DOCTYPE html>
<!-- saved from url=(0081)https://n.6135.life/images/lists.html?orderCode=lastTime&tag_id=0&sub_cid=0&cid=0 -->
<html lang="en">

<head>
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
    <meta content="telephone=no" name="format-detection">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SX色香视频-SXMV</title>
    <link rel="stylesheet" href="./SXfiles/common.css">
    <script src="./SXfiles/jquery-3.2.1.min.js"></script>
    <link rel="stylesheet" href="./SXfiles/iconfont.css">
</head>

<body>
    <div>
        <header class="js-header">
            <div class="head">
                <span>图集列表</span>
            </div>
        </header>
        <div class="content">
            <link rel="stylesheet" href="./SXfiles/i-list.css">
            <div class="panel">
                <ul class="pic-list clearfix">
                    
                </ul>
            </div>
        </div>
        <a class="btn-gotop" id="btn-gotop"><i class="btn fn-top"></i></a>
    </div>
    <script>
        $(function(){
            var page  = 0;
            var morepage = 0;
            $.getJSON("./data/index"+page+".json", function(data){
                var datas = data.list;
                morepage = data.morePage;
                var html = '';
                datas.forEach(function(item) {
                    var url =  './album.html?id='+item['id'];
                    html += '<li>';
                    html += '<div class="ub-list">';
                    html += '    <a href="'+url+'" class="ub-link">';
                    html += '    <div class="ub-pic"';
                    html += 'style="background-image: url('+item['cover']+');"></div>';
                    html += '    <span class="ub-tit">'+item['title']+'</span>';
                    html += '</a>';
                    html += '</div>';
                    html += '</li>';
                });
                $('.not-comment').remove();
                $('.pic-list').append(html);
                page++;
            })
            $(window).scroll(function(){
                var srollPos = $(window).scrollTop();
                if((srollPos+$(window).height() > $(document).height() - 80)&&(morepage==1)){
                    $.getJSON("./data/index"+page+".json", function(data){
                        var datas = data.list;
                        morepage = data.morePage;
                        var html = '';
                        datas.forEach(function(item) {
                            var url =  './album.html?id='+item['id'];
                            html += '<li>';
                            html += '<div class="ub-list">';
                            html += '    <a href="'+url+'" class="ub-link">';
                            html += '    <div class="ub-pic"';
                            html += 'style="background-image: url('+item['cover']+');"></div>';
                            html += '    <span class="ub-tit">'+item['title']+'</span>';
                            html += '</a>';
                            html += '</div>';
                            html += '</li>';
                        });
                        $('.not-comment').remove();
                        $('.pic-list').append(html);
                        page++;
                    })
                }
            })
        })
    </script>

    <script type="text/javascript">
    $(function() {
        //to and footer nav setting
        var navTopTitle = "图片列表";
        $('#navTopTitle').html(navTopTitle);
        $('.navFooter').removeClass('active');
        $('.navFooter:nth-child(2)').addClass('active');

        $(window).scroll(function() {
            if ($(window).scrollTop() > 100) {
                $("#btn-gotop").fadeIn(500);
            } else {
                $("#btn-gotop").fadeOut(500);
            }
        });
        //当点击跳转链接后，回到页面顶部位置
        $("#btn-gotop").click(function() {
            $('body,html').animate({ scrollTop: 0 }, 1000); //1000代表1秒时间回到顶点
            return false;
        });

    });
    </script>
    <style>
    .btn-gotop {
        display: none;
        position: fixed;
        bottom: 150px;
        right: 10px;
        background: rgba(0, 0, 0, .5);
        width: 50px;
        height: 50px;
        border-radius: 5px;
        z-index: 99;
        text-align: center;
        line-height: 50px;
        color: #fff;
    }

    .btn-gotop:hover {
        color: #fff;
    }

    .btn-gotop i {
        font-size: 40px;
    }
    </style>

</body>

</html>
